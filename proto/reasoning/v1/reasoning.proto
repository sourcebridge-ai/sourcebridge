syntax = "proto3";

package sourcebridge.reasoning.v1;

option go_package = "github.com/sourcebridge/sourcebridge/gen/go/reasoning/v1;reasoningv1";

import "common/v1/types.proto";

// ReasoningService handles LLM-powered code analysis
service ReasoningService {
  // AnalyzeSymbol provides deep analysis of a code symbol
  rpc AnalyzeSymbol(AnalyzeSymbolRequest) returns (AnalyzeSymbolResponse);

  // ExplainRelationship explains the relationship between symbols
  rpc ExplainRelationship(ExplainRelationshipRequest) returns (ExplainRelationshipResponse);

  // AnswerQuestion answers a natural language question about the codebase
  rpc AnswerQuestion(AnswerQuestionRequest) returns (AnswerQuestionResponse);

  // AnswerQuestionStream is the server-streaming variant of AnswerQuestion.
  // The server emits zero-or-more AnswerDelta messages containing incremental
  // text chunks while the model is generating, followed by a terminal
  // AnswerDelta with `finished = true` carrying the final usage stats. This
  // lets callers render tokens progressively instead of waiting for the whole
  // answer. Semantics of the request are identical to AnswerQuestion.
  rpc AnswerQuestionStream(AnswerQuestionRequest) returns (stream AnswerDelta);

  // ReviewFile performs a template-based code review of a file
  rpc ReviewFile(ReviewFileRequest) returns (ReviewFileResponse);

  // GenerateEmbedding creates an embedding vector for text
  rpc GenerateEmbedding(GenerateEmbeddingRequest) returns (GenerateEmbeddingResponse);

  // SimulateChange resolves symbols affected by a hypothetical change description
  rpc SimulateChange(SimulateChangeRequest) returns (SimulateChangeResponse);

  // AnswerQuestionWithTools is the agentic-retrieval variant of
  // AnswerQuestion. The caller provides a set of tool schemas the
  // model may call; the worker returns either a final text answer
  // (terminal turn) or a list of tool calls the caller must execute
  // and feed back on the next call. Each call carries the
  // conversation-so-far so the worker is stateless.
  //
  // Providers/models that do not support structured tool use return
  // `capability_supported = false` in the response; callers must
  // fall back to AnswerQuestion for those deployments.
  rpc AnswerQuestionWithTools(AnswerQuestionWithToolsRequest) returns (AnswerQuestionWithToolsResponse);

  // GetProviderCapabilities returns static capability flags for the
  // active provider/model. The orchestrator calls this on startup
  // and caches the result so the agentic path can be gated without
  // a per-request round-trip.
  rpc GetProviderCapabilities(GetProviderCapabilitiesRequest) returns (GetProviderCapabilitiesResponse);

  // ClassifyQuestion runs a cheap LLM classifier (Haiku) that
  // returns the question's likely class plus evidence-kind hints
  // (needs_call_graph, needs_tests, ...) and advisory symbol /
  // file / topic candidates the agentic loop can pre-populate in
  // its seed context. Quality-push Phase 2.
  //
  // Fail-open: if this RPC errors, the orchestrator falls back to
  // the keyword classifier. Callers should time this call out
  // aggressively (≤ 2s).
  rpc ClassifyQuestion(ClassifyQuestionRequest) returns (ClassifyQuestionResponse);

  // DecomposeQuestion splits a multi-hop question into 3–4 focused
  // sub-questions that the agentic loop can answer in parallel,
  // then hand off to a final synthesis turn. Quality-push Phase 4.
  //
  // Fail-open: if this RPC errors, the orchestrator runs the
  // single-loop agentic path on the original question. Aggressively
  // timed out (≤ 3s).
  rpc DecomposeQuestion(DecomposeQuestionRequest) returns (DecomposeQuestionResponse);

  // SynthesizeDecomposedAnswer takes the original question + the
  // sub-question / sub-answer pairs and produces the final answer.
  // Used as step 3 of Phase-4 decomposition. Citation tags from
  // sub-answers are preserved so the reference resolver sees them.
  rpc SynthesizeDecomposedAnswer(SynthesizeDecomposedAnswerRequest) returns (SynthesizeDecomposedAnswerResponse);
}

message AnalyzeSymbolRequest {
  sourcebridge.common.v1.CodeSymbol symbol = 1;
  string surrounding_context = 2;
  string repository_id = 3;
}

message AnalyzeSymbolResponse {
  string summary = 1;
  string purpose = 2;
  repeated string concerns = 3;
  repeated string suggestions = 4;
  sourcebridge.common.v1.LLMUsage usage = 5;
}

message ExplainRelationshipRequest {
  sourcebridge.common.v1.CodeSymbol source = 1;
  sourcebridge.common.v1.CodeSymbol target = 2;
  string relationship_type = 3;
}

message ExplainRelationshipResponse {
  string explanation = 1;
  sourcebridge.common.v1.Confidence confidence = 2;
  sourcebridge.common.v1.LLMUsage usage = 3;
}

message AnswerQuestionRequest {
  string question = 1;
  string repository_id = 2;
  repeated sourcebridge.common.v1.CodeSymbol context_symbols = 3;
  int32 max_tokens = 4;
  string context_code = 5;
  string file_path = 6;
  sourcebridge.common.v1.Language language = 7;
}

message AnswerQuestionResponse {
  string answer = 1;
  repeated sourcebridge.common.v1.CodeSymbol referenced_symbols = 2;
  sourcebridge.common.v1.LLMUsage usage = 3;
}

// AnswerDelta is one frame on the AnswerQuestionStream wire. Most frames
// contain just an incremental `content_delta` (text appended to the running
// answer). The final frame sets `finished = true` and carries the resolved
// `referenced_symbols` and `usage`; consumers must treat that frame as the
// signal to stop rendering deltas.
//
// Non-content frames set `progress` to a structured event describing a
// phase change inside the agentic loop (planning, tool_call,
// synthesizing). These let the Go relay forward intermediate progress
// to MCP's ContentEmitter so streaming clients can show "agent is
// calling search_evidence..." without waiting for the full answer.
message AnswerDelta {
  string content_delta = 1;
  bool finished = 2;
  // Populated only on the terminal frame.
  repeated sourcebridge.common.v1.CodeSymbol referenced_symbols = 3;
  sourcebridge.common.v1.LLMUsage usage = 4;
  // Progress event — set on non-content phase transitions.
  // content_delta is empty when progress is set.
  ProgressEvent progress = 5;
}

// ProgressEvent describes one phase transition in the agentic
// retrieval loop. `phase` is a stable string identifier; clients
// compare literal values (not enums — easier to extend without a
// proto bump). `detail` is optional human-readable context the
// client can render verbatim.
//
// Stable phase values (2026-04-24):
//   "planning"         — classifier decided which strategy to run
//   "tool_call"        — agent invoked a tool. `detail` = tool name
//                         + args summary (e.g. "search_evidence query=auth")
//   "tool_result"      — tool returned. `detail` = result summary
//                         (e.g. "search_evidence: 12 results")
//   "synthesizing"     — final answer generation started
//   "error"            — recoverable per-phase error. `detail` =
//                         message. The stream does NOT end here —
//                         the agent may retry or fall back.
//
// New phase values are additive. Clients should ignore unknown
// phases rather than failing.
message ProgressEvent {
  string phase = 1;
  string detail = 2;
  // Optional tool-specific fields. Populated for "tool_call" and
  // "tool_result" phases; empty otherwise.
  string tool_name = 3;
  // Elapsed time since the request started, milliseconds. Useful
  // for UIs that want to show "searching for 2.3s".
  int64 elapsed_ms = 4;
}

message ReviewFileRequest {
  string repository_id = 1;
  string file_path = 2;
  sourcebridge.common.v1.Language language = 3;
  string content = 4;
  string template = 5; // security, solid, performance, reliability, maintainability
}

message ReviewFileResponse {
  string template = 1;
  repeated ReviewFinding findings = 2;
  float score = 3;
  sourcebridge.common.v1.LLMUsage usage = 4;
}

message ReviewFinding {
  string category = 1;
  string severity = 2; // critical, high, medium, low, info
  string message = 3;
  string file_path = 4;
  int32 start_line = 5;
  int32 end_line = 6;
  string suggestion = 7;
}

message GenerateEmbeddingRequest {
  string text = 1;
  string model = 2;
}

message GenerateEmbeddingResponse {
  sourcebridge.common.v1.Embedding embedding = 1;
  sourcebridge.common.v1.LLMUsage usage = 2;
}

message SimulateChangeRequest {
  string repository_id = 1;
  string description = 2;                              // Natural language change description
  string anchor_file = 3;                              // Optional: narrow to a file
  string anchor_symbol = 4;                            // Optional: narrow to a symbol
  repeated sourcebridge.common.v1.CodeSymbol symbols = 5;  // All indexed symbols for the repo
  int32 top_n = 6;                                     // Max symbols to resolve (default 10)
  float confidence_threshold = 7;                       // Min similarity (default 0.35)
}

message SimulatedSymbolMatch {
  string symbol_id = 1;
  string name = 2;
  string qualified_name = 3;
  string kind = 4;
  string file_path = 5;
  float similarity = 6;      // Cosine similarity score
  bool is_anchor = 7;        // True if this was the explicitly anchored symbol
}

message SimulateChangeResponse {
  repeated SimulatedSymbolMatch resolved_symbols = 1;
  string description_embedding_model = 2;              // Which model generated the embeddings
  int32 symbols_evaluated = 3;                         // Total symbols considered
  sourcebridge.common.v1.LLMUsage usage = 4;           // Token/compute usage
}

// ---------------------------------------------------------------------------
// Agentic retrieval (plan 2026-04-23-agentic-retrieval-for-deep-qa.md)
// ---------------------------------------------------------------------------

// ToolSchema describes one tool the model may call. Kept
// provider-neutral; the worker's provider adapter flattens this into
// the shape the active SDK expects.
message ToolSchema {
  string name = 1;         // e.g. "search_evidence"
  string description = 2;  // natural-language description for the model
  string input_schema_json = 3;  // JSON Schema as a string (passed through to the provider)
}

// AgentMessage is one conversation turn the orchestrator threads
// through AnswerQuestionWithTools. Messages accumulate across calls;
// the worker is stateless.
message AgentMessage {
  // Role: "system" | "user" | "assistant" | "tool_result"
  string role = 1;
  // Plain text content (system / user messages, or the assistant's
  // final text answer).
  string text = 2;
  // Populated only when role == "assistant" and the model emitted
  // tool calls. Each entry is one tool_use block in the
  // conversation.
  repeated ToolCall tool_calls = 3;
  // Populated only when role == "tool_result". Each entry pairs with
  // a prior ToolCall by call_id.
  repeated ToolResult tool_results = 4;
}

// ToolCall is a model-issued request to run a tool. Args is the raw
// JSON the LLM emitted; the dispatcher validates against the tool's
// schema before executing.
message ToolCall {
  string call_id = 1;      // provider-assigned id, opaque to the orchestrator
  string name = 2;         // must match a ToolSchema.name
  string args_json = 3;    // JSON string of the args object
}

// ToolResult is the dispatcher's response to a ToolCall. Shape
// matches the plan's standardized {ok, data, error, hint} envelope.
message ToolResult {
  string call_id = 1;      // pairs with ToolCall.call_id
  bool ok = 2;
  string data_json = 3;    // JSON string of the tool-specific payload (when ok=true)
  string error = 4;        // enum string (when ok=false), e.g. "file_not_found"
  string hint = 5;         // natural-language recovery hint (when ok=false)
}

message AnswerQuestionWithToolsRequest {
  string repository_id = 1;
  // Conversation so far. Orchestrator appends the next turn's
  // tool_result messages and re-calls with the full history (worker
  // is stateless).
  repeated AgentMessage messages = 2;
  // Tool schemas available on this request. Empty means no tools;
  // the model produces a text answer only.
  repeated ToolSchema tools = 3;
  // Soft cap on the output tokens the model may produce this turn.
  int32 max_tokens = 4;
  // When true, attach Anthropic prompt-cache markers
  // (cache_control: ephemeral) to the system prompt and last tool
  // schema. Cuts input-token cost 60–80% on multi-turn loops.
  // Ignored by providers that don't support prompt caching.
  bool enable_prompt_caching = 5;
}

message AnswerQuestionWithToolsResponse {
  // True when the active provider/model supports structured tool
  // use. When false, the orchestrator falls back to AnswerQuestion
  // for this request.
  bool capability_supported = 1;
  // The single assistant-role message the model produced this turn.
  // Either text is populated (final answer) or tool_calls is
  // populated (tool-use turn) — never both.
  AgentMessage turn = 2;
  sourcebridge.common.v1.LLMUsage usage = 3;
  // When the model declined to emit tool calls because a budget /
  // safety gate fired inside the worker, this explains why. Empty
  // on the happy path.
  string termination_hint = 4;
  // Prompt-cache accounting (Anthropic). `cache_creation_input_tokens`
  // counts tokens written to the cache on this turn; `cache_read`
  // counts tokens served from the cache. Zero when prompt caching
  // is disabled or the provider doesn't support it. Surfaced as
  // diagnostics so operators can verify the cache is active.
  int64 cache_creation_input_tokens = 5;
  int64 cache_read_input_tokens = 6;
}

message ClassifyQuestionRequest {
  string repository_id = 1;
  string question = 2;
  // Optional caller-provided context the classifier can use: a
  // file path or pinned code snippet narrows its hypothesis.
  string file_path = 3;
  string pinned_code = 4;
}

message ClassifyQuestionResponse {
  // True when the worker has an LLM available for classification.
  // False when the provider/model can't serve the call; callers
  // fall back to the Go-side keyword classifier.
  bool capability_supported = 1;
  // Canonical question class, matching QuestionKind enum strings
  // on the Go side: "architecture", "behavior", "execution_flow",
  // "cross_cutting", "ownership", "requirement_coverage",
  // "data_model", "risk_review".
  string question_class = 2;
  // Evidence-kind hints. The agentic loop pre-populates seed
  // context with matching evidence (summaries, tests, graph
  // neighbors, requirements) so the first turn sees it.
  bool needs_call_graph = 3;
  bool needs_requirements = 4;
  bool needs_tests = 5;
  bool needs_summaries = 6;
  // Advisory candidates. Empty when the LLM can't extract any.
  repeated string symbol_candidates = 7;
  repeated string file_candidates = 8;
  repeated string topic_terms = 9;
  // Usage accounting for telemetry / cost tracking.
  sourcebridge.common.v1.LLMUsage usage = 10;
}

message DecomposeQuestionRequest {
  string repository_id = 1;
  string question = 2;
  // Hint from the classifier ("architecture", "cross_cutting",
  // ...). Lets the decomposer tune its split strategy per class.
  string question_class = 3;
  // Max sub-questions the decomposer should produce. Default 4.
  // Zero means default.
  int32 max_sub_questions = 4;
}

message DecomposeQuestionResponse {
  bool capability_supported = 1;
  // Sub-questions in recommended execution order. Empty when the
  // decomposer decided the question is already atomic — caller
  // should run the original question through the single loop.
  repeated string sub_questions = 2;
  sourcebridge.common.v1.LLMUsage usage = 3;
}

message SynthesizeDecomposedAnswerRequest {
  string repository_id = 1;
  string original_question = 2;
  repeated DecomposedSubAnswer sub_answers = 3;
  bool enable_prompt_caching = 4;
}

message DecomposedSubAnswer {
  string sub_question = 1;
  // The sub-answer text, citation tags intact. Empty when the
  // sub-loop failed; the synthesizer treats this as "no evidence
  // on that angle".
  string sub_answer = 2;
  // Handles referenced by the sub-answer (stable IDs per
  // §Source-Handle Contract). The synthesizer unions these for
  // the final reference list.
  repeated string reference_handles = 3;
  // Classification-diagnostic fields: what terminated this sub-loop,
  // how many tool calls, etc. Currently informational.
  string termination_reason = 4;
  int32 tool_calls_count = 5;
}

message SynthesizeDecomposedAnswerResponse {
  string answer = 1;
  sourcebridge.common.v1.LLMUsage usage = 2;
  int64 cache_creation_input_tokens = 3;
  int64 cache_read_input_tokens = 4;
}

message GetProviderCapabilitiesRequest {}

message GetProviderCapabilitiesResponse {
  // Active provider name, e.g. "anthropic", "openai", "ollama".
  string provider = 1;
  // Active model ID, e.g. "claude-sonnet-4-5".
  string model = 2;
  // True when this provider/model supports structured tool use.
  bool tool_use_supported = 3;
  // True when the provider supports prompt caching (informational —
  // affects cost, not correctness).
  bool prompt_caching_supported = 4;
}
