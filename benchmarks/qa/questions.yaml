# QA parity question set — frozen gold set
#
# Authored 2026-04-22 for the deep-QA server-side orchestrator
# migration. 120 questions across 3 repos with the plan's class
# distribution:
#
#   Architecture             25  (17 SourceBridge, 8 acme-api)
#   Ownership / Location     25  (10 SourceBridge, 10 acme-api, 5 multi-lang-go)
#   Execution Flow           25  (10 SourceBridge, 10 acme-api, 5 multi-lang-go)
#   Cross-cutting / Risk     25  (20 SourceBridge, 5 acme-api)
#   Mixed / Behavior         20  (10 SourceBridge, 10 acme-api)
#
# Freeze policy: append-only. Renaming or removing a question after
# a baseline report is published invalidates the paired comparison.
# Prefer adding new questions at the end with fresh IDs over editing
# existing rows.
#
# Repo IDs are placeholders; seed.sh writes real IDs into the
# environment.yaml after import. The runner substitutes.
version: 1

questions:

