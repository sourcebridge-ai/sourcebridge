apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: cache
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
      app.kubernetes.io/part-of: sourcebridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: sourcebridge
        app.kubernetes.io/component: cache
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args:
            # MCP sessions are ephemeral; we don't need RDB/AOF persistence
            # to survive a Redis restart — the client will just re-initialize.
            - "--save"
            - ""
            - "--appendonly"
            - "no"
            - "--maxmemory"
            - "128mb"
            - "--maxmemory-policy"
            - "allkeys-lru"
          ports:
            - containerPort: 6379
              name: redis
              protocol: TCP
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "200m"
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: sourcebridge
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sourcebridge
    app.kubernetes.io/component: cache
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: sourcebridge
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
