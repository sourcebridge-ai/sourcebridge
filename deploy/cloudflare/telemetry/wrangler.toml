name = "sourcebridge-telemetry"
main = "src/worker.ts"
compatibility_date = "2024-12-01"

routes = [
  { pattern = "telemetry.sourcebridge.ai/*", zone_name = "sourcebridge.ai" }
]

[[d1_databases]]
binding = "DB"
database_name = "sourcebridge-telemetry"
database_id = "3b91def6-5729-4562-988f-24eeb976fc24"

[vars]
# POSTHOG_API_KEY is set via `wrangler secret put POSTHOG_API_KEY`
POSTHOG_HOST = "https://us.i.posthog.com"
