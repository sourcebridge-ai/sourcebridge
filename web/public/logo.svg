<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" fill="none">
  <defs>
    <linearGradient id="gradNeon" x1="180" y1="180" x2="844" y2="844" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#63F3FF"/>
      <stop offset="50%" stop-color="#8FA0FF"/>
      <stop offset="100%" stop-color="#F06CFF"/>
    </linearGradient>
    <linearGradient id="gradFill" x1="220" y1="160" x2="860" y2="864" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#123F8B"/>
      <stop offset="55%" stop-color="#091B59"/>
      <stop offset="100%" stop-color="#2E0B63"/>
    </linearGradient>
    <radialGradient id="innerGlow" cx="50%" cy="24%" r="70%">
      <stop offset="0%" stop-color="#59A2FF" stop-opacity="0.33"/>
      <stop offset="40%" stop-color="#3B59D5" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="0"/>
    </radialGradient>
    <filter id="outerGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="textShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset dx="0" dy="4" result="o"/>
      <feGaussianBlur in="o" stdDeviation="3" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.02  0 0 0 0 0.03  0 0 0 0 0.12  0 0 0 0.8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="clipPanel">
      <rect x="128" y="96" width="768" height="832" rx="132"/>
    </clipPath>
    <style>
      .line { stroke: url(#gradNeon); stroke-linecap: round; stroke-linejoin: round; fill: none; }
      .thin { stroke-width: 6; }
      .med { stroke-width: 8; }
      .bold { stroke-width: 12; }
      .txt { font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Arial, sans-serif; font-weight: 800; }
    </style>
  </defs>

  <!-- Transparent outer canvas. Logo starts here -->
  <g filter="url(#outerGlow)">
    <rect x="128" y="96" width="768" height="832" rx="132" fill="url(#gradFill)"/>
    <rect x="128" y="96" width="768" height="832" rx="132" fill="url(#innerGlow)"/>
    <rect x="128" y="96" width="768" height="832" rx="132" stroke="url(#gradNeon)" stroke-width="8"/>
  </g>

  <g clip-path="url(#clipPanel)">
    <ellipse cx="512" cy="258" rx="260" ry="185" fill="#79C7FF" opacity="0.10"/>
    <ellipse cx="512" cy="834" rx="300" ry="150" fill="#07103D" opacity="0.55"/>
  </g>

  <!-- Bridge + code -->
  <g filter="url(#softGlow)">
    <!-- bridge deck -->
    <path class="line med" d="M256 538H769"/>
    <path class="line med" d="M256 554H409"/>
    <path class="line med" d="M615 554H769"/>
    <!-- side dots -->
    <g class="line med">
      <path d="M228 538h8"/><path d="M212 538h4"/>
      <path d="M228 554h8"/><path d="M212 554h4"/>
      <path d="M796 538h8"/><path d="M812 538h4"/>
      <path d="M796 554h8"/><path d="M812 554h4"/>
    </g>

    <!-- left tower -->
    <path class="line bold" d="M344 288v346"/>
    <path class="line med" d="M329 288v126M359 288v126"/>
    <path class="line med" d="M344 330L252 452M344 372L292 452M344 330L436 452M344 372L396 452"/>
    <path class="line med" d="M264 440v70M304 388v122M384 388v122M424 440v70"/>
    <circle cx="304" cy="436" r="10" class="line med"/>
    <circle cx="384" cy="400" r="10" class="line med"/>

    <!-- right tower -->
    <path class="line bold" d="M680 288v346"/>
    <path class="line med" d="M665 288v126M695 288v126"/>
    <path class="line med" d="M680 330L588 452M680 372L628 452M680 330L772 452M680 372L732 452"/>
    <path class="line med" d="M600 440v70M640 388v122M720 388v122M760 440v70"/>
    <circle cx="640" cy="400" r="10" class="line med"/>
    <circle cx="720" cy="436" r="10" class="line med"/>

    <!-- piers -->
    <path class="line med" d="M302 636h84M324 608h40v28h-40z"/>
    <path class="line med" d="M638 636h84M660 608h40v28h-40z"/>

    <!-- under-bridge arcs -->
    <path class="line med" d="M409 554c-48 0-80 16-106 55"/>
    <path class="line med" d="M615 554c48 0 80 16 106 55"/>
    <path class="line med" d="M303 609c20-4 49-6 83-6"/>
    <path class="line med" d="M638 603c34 0 63 2 83 6"/>

    <!-- code chevrons -->
    <path class="line med" d="M278 448l-18 15 18 15M309 448l18 15-18 15"/>
    <path class="line med" d="M302 387l-18 15 18 15M333 387l18 15-18 15"/>
    <path class="line med" d="M691 387l-18 15 18 15M722 387l18 15-18 15"/>
    <path class="line med" d="M717 448l-18 15 18 15M748 448l18 15-18 15"/>
  </g>

  <!-- Magnifying glass -->
  <g filter="url(#softGlow)">
    <circle cx="512" cy="438" r="112" fill="rgba(255,255,255,0.03)" stroke="url(#gradNeon)" stroke-width="10"/>
    <circle cx="512" cy="438" r="86" fill="#A6D6FF" fill-opacity="0.12"/>
    <rect x="591" y="519" width="122" height="38" rx="18" transform="rotate(45 591 519)" fill="url(#gradNeon)" fill-opacity="0.95"/>
    <rect x="597" y="525" width="106" height="24" rx="12" transform="rotate(45 597 525)" fill="#D8C4FF" fill-opacity="0.35"/>

    <!-- documents -->
    <path class="line med" d="M458 386h64c8 0 14 6 14 14v83c0 8-6 14-14 14h-64c-8 0-14-6-14-14v-83c0-8 6-14 14-14z"/>
    <path class="line thin" d="M470 370h64c8 0 14 6 14 14v83"/>
    <path class="line thin" d="M482 355h64c8 0 14 6 14 14v67"/>
    <path class="line thin" d="M468 418h42M468 436h42M468 454h28"/>
    <path class="line thin" d="M468 406l10 10 18-20"/>

    <!-- gear -->
    <g transform="translate(556 460)">
      <circle r="20" fill="none" stroke="url(#gradNeon)" stroke-width="8"/>
      <circle r="8" fill="none" stroke="url(#gradNeon)" stroke-width="6"/>
      <path class="line med" d="M0-34v10M0 24v10M-34 0h10M24 0h10M24.04-24.04l-7.07 7.07M-16.97 16.97l-7.07 7.07M-24.04-24.04l7.07 7.07M16.97 16.97l7.07 7.07"/>
    </g>
  </g>

  <!-- Compass mark -->
  <g filter="url(#softGlow)" transform="translate(512 642)">
    <path d="M0-42L14-12L0-18L-14-12Z" fill="url(#gradNeon)"/>
    <path d="M42 0L12 14L18 0L12-14Z" fill="url(#gradNeon)"/>
    <path d="M0 42L-14 12L0 18L14 12Z" fill="url(#gradNeon)"/>
    <path d="M-42 0L-12-14L-18 0L-12 14Z" fill="url(#gradNeon)"/>
    <circle r="32" class="line thin"/>
    <path class="line med" d="M-14 10l40-20-20 40-8-12-12-8z"/>
    <circle r="3" fill="#D7F9FF"/>
  </g>

  <!-- Brand -->
  <g filter="url(#textShadow)">
    <text x="512" y="818" text-anchor="middle" class="txt" font-size="88" fill="#FFFFFF" letter-spacing="-2">SourceBridge.ai</text>
  </g>
</svg>
